<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
#game-wrapper {
  position: relative;
  border: 4px solid #e94560;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(233, 69, 96, 0.5), 0 0 80px rgba(233, 69, 96, 0.2);
  overflow: hidden;
}
canvas { display: block; background: #0f0f23; }
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 10px 16px;
  pointer-events: none;
  color: #fff;
  font-size: 14px;
  font-weight: bold;
}
.ui-panel {
  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid #333;
}
.ui-panel span { color: #e94560; }
#game-over-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
}
#game-over-screen h1 {
  font-size: 48px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px #e94560;
}
#game-over-screen .sub { color: #aaa; margin-bottom: 20px; font-size: 18px; }
#game-over-screen .final-score { font-size: 24px; margin-bottom: 30px; }
#game-over-screen .final-score span { color: #e94560; }
#restart-btn {
  pointer-events: all;
  padding: 12px 40px;
  font-size: 18px;
  font-family: inherit;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 2px;
  transition: background 0.2s;
}
#restart-btn:hover { background: #ff6b81; }
#level-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
}
#level-screen h2 { font-size: 36px; text-shadow: 0 0 15px #0f3460; }
.mobile-controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 8px;
}
.mobile-controls button {
  width: 56px; height: 56px;
  font-size: 24px;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: #fff;
  border-radius: 50%;
  cursor: pointer;
  touch-action: manipulation;
}
.mobile-controls button:active { background: rgba(233,69,96,0.5); }
#fire-btn {
  width: 72px; height: 72px;
  font-size: 20px;
  background: rgba(233,69,96,0.4);
  border-color: #e94560;
}
@media (max-width: 700px) { .mobile-controls { display: grid; grid-template-columns: repeat(3, auto); grid-template-rows: repeat(2, auto); } }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <div class="ui-panel">🏆 <span id="score">0</span></div>
    <div class="ui-panel">🎯 关卡 <span id="level">1</span></div>
    <div class="ui-panel">❤️ <span id="lives">3</span></div>
    <div class="ui-panel">💥 <span id="enemies">0</span></div>
  </div>
  <div id="game-over-screen">
    <h1 id="go-title">GAME OVER</h1>
    <p class="sub" id="go-sub"></p>
    <p class="final-score">得分: <span id="final-score">0</span></p>
    <button id="restart-btn" onclick="restartGame()">重新开始</button>
  </div>
  <div id="level-screen">
    <h2 id="level-text"></h2>
  </div>
  <div class="mobile-controls" id="mobile-ctrl">
    <button style="grid-column:2;grid-row:1;" ontouchstart="setDir('up')" ontouchend="setDir(null)" onmousedown="setDir('up')" onmouseup="setDir(null)">▲</button>
    <button style="grid-column:1;grid-row:2;" ontouchstart="setDir('left')" ontouchend="setDir(null)" onmousedown="setDir('left')" onmouseup="setDir(null)">◀</button>
    <button style="grid-column:3;grid-row:2;" ontouchstart="setDir('right')" ontouchend="setDir(null)" onmousedown="setDir('right')" onmouseup="setDir(null)">▶</button>
    <button style="grid-column:2;grid-row:2;" ontouchstart="setDir('down')" ontouchend="setDir(null)" onmousedown="setDir('down')" onmouseup="setDir(null)">▼</button>
    <button id="fire-btn" style="grid-column:2;grid-row:3;" ontouchstart="mobileFire()" onmousedown="mobileFire()">FIRE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Canvas size
const COLS = 26;
const ROWS = 26;
const CELL = 24;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Directions
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// Sound (simple oscillator)
function playSound(freq, duration, type = 'square', vol = 0.06) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

// Game state
let score, level, lives, enemiesLeft;
let player, enemies, bullets, walls, particles;
let keys = {};
let gameOver = false;
let levelTransition = false;
let enemyMoveTimer = 0;
let enemyShootTimer = 0;
let playerShootCooldown = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

const TILE = { EMPTY: 0, BRICK: 1, STEEL: 2, BASE: 3 };

function generateMap() {
  const map = [];
  for (let y = 0; y < ROWS; y++) {
    map[y] = [];
    for (let x = 0; x < COLS; x++) {
      if (y === 0 || y === ROWS - 1 || x === 0 || x === COLS - 1) {
        map[y][x] = TILE.STEEL;
      } else {
        map[y][x] = TILE.EMPTY;
      }
    }
  }

  // Base (eagle) in center-bottom
  map[ROWS - 2][Math.floor(COLS / 2)] = TILE.BASE;
  map[ROWS - 2][Math.floor(COLS / 2) - 1] = TILE.STEEL;
  map[ROWS - 2][Math.floor(COLS / 2) + 1] = TILE.STEEL;
  map[ROWS - 3][Math.floor(COLS / 2) - 1] = TILE.STEEL;
  map[ROWS - 3][Math.floor(COLS / 2) + 1] = TILE.STEEL;

  // Generate brick clusters
  const brickPatterns = [
    // Horizontal walls
    [4, 5, 10, 2], [12, 6, 6, 1], [6, 12, 12, 1],
    [14, 14, 8, 1], [2, 10, 8, 1], [16, 12, 6, 1],
    [4, 16, 6, 1], [16, 8, 6, 1], [10, 18, 8, 1],
    // Vertical walls
    [8, 5, 1, 4], [18, 5, 1, 4], [4, 12, 1, 3],
    [20, 10, 1, 3], [12, 16, 1, 3], [6, 18, 1, 3],
    [16, 8, 1, 5], [10, 5, 1, 2], [20, 18, 1, 3],
    // L-shapes
    [2, 2, 3, 1], [2, 3, 1, 2],
    [21, 2, 3, 1], [23, 3, 1, 2],
    // Cross shapes
    [12, 3, 1, 5], [3, 9, 5, 1],
    [18, 15, 5, 1], [12, 20, 1, 4],
    // Extra cover
    [6, 8, 1, 2], [18, 8, 1, 2],
    [8, 20, 3, 1], [14, 20, 3, 1],
  ];

  brickPatterns.forEach(([ox, oy, w, h]) => {
    for (let y = oy; y < oy + h && y < ROWS - 1; y++) {
      for (let x = ox; x < ox + w && x < COLS - 1; x++) {
        if (map[y][x] === TILE.EMPTY) {
          map[y][x] = TILE.BRICK;
        }
      }
    }
  });

  return map;
}

function vecInWall(px, py, map) {
  // Check all 4 corners of a CELL-sized square
  const margin = 2;
  const cx = px + CELL / 2;
  const cy = py + CELL / 2;
  const checks = [
    [px + margin, py + margin],
    [px + CELL - margin, py + margin],
    [px + margin, py + CELL - margin],
    [px + CELL - margin, py + CELL - margin],
  ];
  for (const [cx2, cy2] of checks) {
    const tx = Math.floor(cx2 / CELL);
    const ty = Math.floor(cy2 / CELL);
    if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return true;
    if (map[ty][tx] !== TILE.EMPTY) return true;
  }
  return false;
}

function snapToGrid(v) {
  return Math.round(v / CELL) * CELL;
}

class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.color = color;
    this.speed = isPlayer ? 2.5 : 1.0 + level * 0.2;
    this.isPlayer = isPlayer;
    this.alive = true;
    this.shootCooldown = 0;
    this.moveCooldown = 0;
    this.hp = isPlayer ? 3 : 1;
    this.flashTimer = 0;
  }

  get cx() { return this.x + CELL / 2; }
  get cy() { return this.y + CELL / 2; }

  draw(ctx) {
    if (!this.alive) return;
    if (this.flashTimer > 0 && Math.floor(this.flashTimer * 10) % 2 === 0) return;

    ctx.save();
    ctx.translate(this.cx, this.cy);
    ctx.rotate((this.dir * Math.PI) / 2);

    // Tracks
    ctx.fillStyle = this.isPlayer ? '#1a5c1a' : '#5c1a1a';
    ctx.fillRect(-10, -11, 6, 22);
    ctx.fillRect(4, -11, 6, 22);

    // Body
    const grad = ctx.createLinearGradient(-8, 0, 8, 0);
    if (this.isPlayer) {
      grad.addColorStop(0, '#2d8f2d');
      grad.addColorStop(0.5, '#4caf50');
      grad.addColorStop(1, '#1b5e20');
    } else {
      grad.addColorStop(0, '#8f2d2d');
      grad.addColorStop(0.5, '#e53935');
      grad.addColorStop(1, '#5e1b1b');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(-8, -9, 16, 18);

    // Barrel
    ctx.fillStyle = '#333';
    ctx.fillRect(-2, -16, 4, 16);
    ctx.fillStyle = '#555';
    ctx.fillRect(-1, -15, 2, 14);

    // Turret circle
    ctx.fillStyle = this.isPlayer ? '#388e3c' : '#d32f2f';
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = this.isPlayer ? '#4caf50' : '#f44336';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  move(dir, map) {
    if (!this.alive) return false;
    this.dir = dir;
    const nx = this.x + DX[dir] * this.speed;
    const ny = this.y + DY[dir] * this.speed;

    // Check map bounds
    if (nx < 0 || nx > canvas.width - CELL || ny < 0 || ny > canvas.height - CELL) return false;

    // Check wall collision
    if (vecInWall(nx, ny, map)) return false;

    // Check tank collision
    const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this && e.alive)];
    if (allTanks.some(t => t && t.alive && t !== this && rectsOverlap(nx, ny, CELL, CELL, t.x, t.y, CELL, CELL))) {
      return false;
    }

    this.x = nx;
    this.y = ny;
    return true;
  }

  shoot() {
    if (!this.alive || this.shootCooldown > 0) return null;
    this.shootCooldown = this.isPlayer ? 15 : 60 - level * 3;
    const bx = this.cx + DX[this.dir] * 12 - 3;
    const by = this.cy + DY[this.dir] * 12 - 3;
    return new Bullet(bx, by, this.dir, this.isPlayer);
  }
}

class Bullet {
  constructor(x, y, dir, fromPlayer) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.speed = 4;
    this.fromPlayer = fromPlayer;
    this.alive = true;
    this.size = 6;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  update(map) {
    this.x += DX[this.dir] * this.speed;
    this.y += DY[this.dir] * this.speed;

    // Out of bounds
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      return false;
    }

    // Hit wall
    const tx = Math.floor(this.cx / CELL);
    const ty = Math.floor(this.cy / CELL);
    if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS) {
      if (map[ty][tx] === TILE.BRICK) {
        map[ty][tx] = TILE.EMPTY;
        spawnParticles(tx * CELL + CELL / 2, ty * CELL + CELL / 2, '#c49a4a', 6);
        playSound(80, 0.1, 'square', 0.04);
        return false;
      }
      if (map[ty][tx] === TILE.STEEL) {
        spawnParticles(tx * CELL + CELL / 2, ty * CELL + CELL / 2, '#888', 4);
        playSound(200, 0.05, 'square', 0.03);
        return false;
      }
      if (map[ty][tx] === TILE.BASE) {
        map[ty][tx] = TILE.EMPTY;
        spawnParticles(tx * CELL + CELL / 2, ty * CELL + CELL / 2, '#ff0', 12);
        playSound(40, 0.5, 'sawtooth', 0.1);
        endGame(false);
        return false;
      }
    }
    return true;
  }

  draw(ctx) {
    ctx.fillStyle = this.fromPlayer ? '#ffeb3b' : '#ff9800';
    ctx.shadowColor = this.fromPlayer ? '#ffeb3b' : '#ff9800';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function rectsOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// Particles
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, color,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.05,
      size: 1 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// Spawn enemies
function spawnEnemies(count) {
  const spawnPoints = [
    [1 * CELL, 1 * CELL],
    [Math.floor(COLS / 2) * CELL, 1 * CELL],
    [(COLS - 2) * CELL, 1 * CELL],
    [1 * CELL, Math.floor(ROWS / 2) * CELL],
    [(COLS - 2) * CELL, Math.floor(ROWS / 2) * CELL],
    [Math.floor(COLS / 2) * CELL, Math.floor(ROWS / 2) * CELL],
  ];
  const colors = ['#e53935', '#ff6d00', '#c62828', '#d84315', '#b71c1c', '#ef6c00'];
  const newEnemies = [];
  for (let i = 0; i < count; i++) {
    const pt = spawnPoints[i % spawnPoints.length];
    const color = colors[i % colors.length];
    const tank = new Tank(pt[0], pt[1], DIR.DOWN, color, false);
    // Try to find a free spot
    for (let attempt = 0; attempt < 10; attempt++) {
      const sx = (1 + Math.floor(Math.random() * (COLS - 2))) * CELL;
      const sy = (1 + Math.floor(Math.random() * 3)) * CELL;
      if (!vecInWall(sx, sy, map) && !enemies.some(e => e.alive && rectsOverlap(sx, sy, CELL, CELL, e.x, e.y, CELL, CELL))) {
        tank.x = sx; tank.y = sy;
        break;
      }
    }
    newEnemies.push(tank);
  }
  return newEnemies;
}

// Input
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'j' || e.key === 'J') {
    e.preventDefault();
    if (player.alive && playerShootCooldown <= 0 && !gameOver && !levelTransition) {
      const bullet = player.shoot();
      if (bullet) {
        bullets.push(bullet);
        playerShootCooldown = 15;
        playSound(600, 0.08, 'square', 0.03);
      }
    }
  }
  if (e.key === 'Enter' || e.key === 'r') {
    if (gameOver) restartGame();
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile controls
function setDir(dir) {
  mobileDir = dir;
}
function mobileFire() {
  if (player.alive && playerShootCooldown <= 0 && !gameOver && !levelTransition) {
    const bullet = player.shoot();
    if (bullet) {
      bullets.push(bullet);
      playerShootCooldown = 15;
      playSound(600, 0.08, 'square', 0.03);
    }
  }
}
let mobileDir = null;

function getInputDir() {
  if (keys['ArrowUp'] || keys['w'] || keys['W'] || mobileDir === 'up') return DIR.UP;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || mobileDir === 'right') return DIR.RIGHT;
  if (keys['ArrowDown'] || keys['s'] || keys['S'] || mobileDir === 'down') return DIR.DOWN;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || mobileDir === 'left') return DIR.LEFT;
  return null;
}

// Game logic
let map;

function initGame() {
  score = 0;
  level = 1;
  lives = 3;
  enemiesLeft = 0;
  bullets = [];
  particles = [];
  gameOver = false;
  levelTransition = false;
  playerShootCooldown = 0;
  shakeTimer = 0;
  shakeIntensity = 0;
  map = generateMap();

  player = new Tank(
    Math.floor(COLS / 2) * CELL,
    (ROWS - 2) * CELL,
    DIR.UP,
    '#4caf50',
    true
  );
  enemies = [];
  spawnLevel();
  updateUI();
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('level-screen').style.display = 'none';
}

function spawnLevel() {
  const count = 3 + level * 2;
  enemies = spawnEnemies(count);
  enemiesLeft = count;
  updateUI();
}

function endGame(won) {
  if (gameOver) return;
  gameOver = true;
  player.alive = false;
  const overlay = document.getElementById('game-over-screen');
  overlay.style.display = 'flex';
  document.getElementById('go-title').textContent = won ? 'YOU WIN!' : 'GAME OVER';
  document.getElementById('go-sub').textContent = won ? '恭喜通关!' : '';
  document.getElementById('final-score').textContent = score;
  if (won) {
    playSound(523, 0.15, 'square', 0.06);
    setTimeout(() => playSound(659, 0.15, 'square', 0.06), 150);
    setTimeout(() => playSound(784, 0.2, 'square', 0.06), 300);
  }
}

function restartGame() {
  initGame();
}

function showLevelScreen() {
  levelTransition = true;
  const scr = document.getElementById('level-screen');
  scr.style.display = 'flex';
  document.getElementById('level-text').textContent = `第 ${level} 关`;
  playSound(440, 0.2, 'square', 0.04);
  setTimeout(() => {
    scr.style.display = 'none';
    levelTransition = false;
    map = generateMap();
    player.x = Math.floor(COLS / 2) * CELL;
    player.y = (ROWS - 2) * CELL;
    player.alive = true;
    player.dir = DIR.UP;
    player.hp = 3;
    bullets = [];
    particles = [];
    enemies = [];
    spawnLevel();
    updateUI();
  }, 1500);
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = lives;
  document.getElementById('enemies').textContent = enemies.filter(e => e.alive).length;
}

// Enemy AI
function updateEnemyAI() {
  enemies.forEach(enemy => {
    if (!enemy.alive) return;

    enemy.moveCooldown--;
    enemy.shootCooldown--;

    // Shoot at player if aligned
    const dx = player.cx - enemy.cx;
    const dy = player.cy - enemy.cy;
    const distToPlayer = Math.sqrt(dx * dx + dy * dy);

    // Try to align and shoot
    if (distToPlayer < 250 && Math.random() < 0.02) {
      let targetDir;
      if (Math.abs(dx) > Math.abs(dy)) {
        targetDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        targetDir = dy > 0 ? DIR.DOWN : DIR.UP;
      }
      enemy.dir = targetDir;
      const bullet = enemy.shoot();
      if (bullet) bullets.push(bullet);
    }

    // Random movement
    if (enemy.moveCooldown <= 0) {
      if (Math.random() < 0.3) {
        // Change direction
        const dirs = [DIR.UP, DIR.RIGHT, DIR.DOWN, DIR.LEFT];
        enemy.move(dirs[Math.floor(Math.random() * 4)], map);
        enemy.moveCooldown = 20 + Math.floor(Math.random() * 40);
      } else {
        // Try to move toward player sometimes
        if (Math.random() < 0.4 && distToPlayer > 150) {
          let targetDir;
          if (Math.abs(dx) > Math.abs(dy)) {
            targetDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
          } else {
            targetDir = dy > 0 ? DIR.DOWN : DIR.UP;
          }
          enemy.move(targetDir, map);
        } else {
          enemy.move(enemy.dir, map);
        }
        enemy.moveCooldown = 15 + Math.floor(Math.random() * 20);
      }
    }

    // Random shooting
    if (enemy.shootCooldown <= 0 && Math.random() < 0.015) {
      const bullet = enemy.shoot();
      if (bullet) bullets.push(bullet);
    }
  });
}

// Main update
function update() {
  if (gameOver || levelTransition) {
    updateParticles();
    return;
  }

  // Player movement
  if (player.alive) {
    const inputDir = getInputDir();
    if (inputDir !== null) {
      player.move(inputDir, map);
    }
    playerShootCooldown--;
    player.shootCooldown--;
    if (player.flashTimer > 0) player.flashTimer--;
  }

  // Enemy AI
  updateEnemyAI();

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.update(map)) {
      bullets.splice(i, 1);
      continue;
    }

    // Check bullet-tank collisions
    let hit = false;
    if (b.fromPlayer) {
      for (const enemy of enemies) {
        if (enemy.alive && rectsOverlap(b.x, b.y, b.size, b.size, enemy.x, enemy.y, CELL, CELL)) {
          enemy.hp--;
          enemy.flashTimer = 0.2;
          if (enemy.hp <= 0) {
            enemy.alive = false;
            score += 100;
            spawnParticles(enemy.cx, enemy.cy, enemy.color, 10);
            playSound(150, 0.15, 'square', 0.05);
            shakeTimer = 8;
            shakeIntensity = 3;
          } else {
            spawnParticles(b.cx, b.cy, '#fff', 3);
          }
          bullets.splice(i, 1);
          hit = true;
          break;
        }
      }
    } else {
      if (player.alive && rectsOverlap(b.x, b.y, b.size, b.size, player.x, player.y, CELL, CELL)) {
        player.hp--;
        player.flashTimer = 0.3;
        spawnParticles(player.cx, player.cy, '#ff0', 5);
        shakeTimer = 12;
        shakeIntensity = 5;
        playSound(60, 0.2, 'sawtooth', 0.08);
        if (player.hp <= 0) {
          player.alive = false;
          spawnParticles(player.cx, player.cy, '#4caf50', 15);
          lives--;
          updateUI();
          if (lives <= 0) {
            endGame(false);
          } else {
            // Respawn
            setTimeout(() => {
              if (gameOver) return;
              player.x = Math.floor(COLS / 2) * CELL;
              player.y = (ROWS - 2) * CELL;
              player.alive = true;
              player.hp = 3;
              player.dir = DIR.UP;
              player.flashTimer = 1.5;
              updateUI();
            }, 800);
          }
        }
        bullets.splice(i, 1);
        hit = true;
      }
    }

    if (!hit) {
      // Bullet-bullet collision
      for (let j = i - 1; j >= 0; j--) {
        const b2 = bullets[j];
        if (b.fromPlayer !== b2.fromPlayer &&
            rectsOverlap(b.x, b.y, b.size, b.size, b2.x, b2.y, b2.size, b2.size)) {
          spawnParticles(b.cx, b.cy, '#fff', 3);
          bullets.splice(Math.max(i, j), 1);
          bullets.splice(Math.min(i, j), 1);
          i = Math.min(i, j);
          hit = true;
          break;
        }
      }
    }
  }

  // Check win condition
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0 && enemiesLeft > 0 && !gameOver) {
    // All enemies destroyed for this level
    score += 200;
    level++;
    updateUI();
    showLevelScreen();
  }

  updateParticles();
  if (shakeTimer > 0) shakeTimer--;
  updateUI();
}

// Render
function drawMap() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const tile = map[y][x];
      const px = x * CELL;
      const py = y * CELL;
      if (tile === TILE.BRICK) {
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.fillStyle = '#a0522d';
        ctx.fillRect(px + 1, py + 1, CELL / 2 - 1, CELL / 2 - 1);
        ctx.fillRect(px + CELL / 2, py + CELL / 2, CELL / 2 - 1, CELL / 2 - 1);
        ctx.strokeStyle = '#6b3410';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px + 0.5, py + 0.5, CELL - 1, CELL - 1);
      } else if (tile === TILE.STEEL) {
        ctx.fillStyle = '#9e9e9e';
        ctx.fillRect(px, py, CELL, CELL);
        const grad = ctx.createLinearGradient(px, py, px + CELL, py + CELL);
        grad.addColorStop(0, '#bdbdbd');
        grad.addColorStop(0.5, '#9e9e9e');
        grad.addColorStop(1, '#757575');
        ctx.fillStyle = grad;
        ctx.fillRect(px + 2, py + 2, CELL - 4, CELL - 4);
      } else if (tile === TILE.BASE) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(px, py, CELL, CELL);
        // Eagle/base symbol
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(px + CELL / 2, py + 2);
        ctx.lineTo(px + CELL - 2, py + CELL - 4);
        ctx.lineTo(px + CELL / 2, py + CELL - 7);
        ctx.lineTo(px + 2, py + CELL - 4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#b8860b';
        ctx.fillRect(px + CELL / 2 - 3, py + CELL - 5, 6, 5);
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Screen shake
  ctx.save();
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 12);
    const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 12);
    ctx.translate(sx, sy);
  }

  drawMap();

  // Draw tanks
  enemies.forEach(e => e.draw(ctx));
  player.draw(ctx);

  // Draw bullets
  bullets.forEach(b => b.draw(ctx));

  // Draw particles
  drawParticles(ctx);

  ctx.restore();

  // Draw player HP bar above player
  if (player.alive && player.hp > 0) {
    const barW = 24;
    const barH = 4;
    const bx = player.x;
    const by = player.y - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, barW, barH);
    const hpRatio = player.hp / 3;
    ctx.fillStyle = hpRatio > 0.6 ? '#4caf50' : hpRatio > 0.3 ? '#ff9800' : '#f44336';
    ctx.fillRect(bx, by, barW * hpRatio, barH);
  }
}

// Game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Check mobile
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('mobile-ctrl').style.display = 'grid';
}

// Start
initGame();
gameLoop();
</script>
